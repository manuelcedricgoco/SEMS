<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img">
  <title>Approvals Icon</title>
  <rect width="128" height="128" rx="24" fill="#6366f1"/>
  <!-- Document -->
  <rect x="22" y="14" width="72" height="90" rx="8" fill="white" opacity="0.95"/>
  <!-- Doc lines -->
  <rect x="32" y="30" width="52" height="5" rx="2.5" fill="#e0e7ff"/>
  <rect x="32" y="42" width="40" height="5" rx="2.5" fill="#e0e7ff"/>
  <rect x="32" y="54" width="48" height="5" rx="2.5" fill="#e0e7ff"/>
  <rect x="32" y="66" width="36" height="5" rx="2.5" fill="#e0e7ff"/>
  <!-- Folded corner -->
  <polygon points="74,14 94,34 74,34" fill="#c7d2fe"/>
  <polygon points="74,14 94,14 94,34" fill="#a5b4fc"/>
  <!-- Approval stamp circle -->
  <circle cx="92" cy="90" r="26" fill="#4f46e5"/>
  <circle cx="92" cy="90" r="22" fill="#4f46e5" stroke="white" stroke-width="3" opacity="0.8"/>
