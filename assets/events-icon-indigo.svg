<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img">
  <title>Events Icon</title>
  <desc>Indigo browse events icon with calendar and event cards</desc>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#6366f1"/>

  <!-- Calendar base -->
  <rect x="14" y="22" width="100" height="88" rx="8" fill="white" opacity="0.95"/>

  <!-- Calendar header -->
  <rect x="14" y="22" width="100" height="26" rx="8" fill="#4f46e5"/>
  <rect x="14" y="36" width="100" height="12" fill="#4f46e5"/>

  <!-- Calendar binding rings -->
  <rect x="36" y="14" width="8" height="16" rx="4" fill="#a5b4fc"/>
  <rect x="84" y="14" width="8" height="16" rx="4" fill="#a5b4fc"/>

  <!-- Header label lines -->
  <rect x="44" y="30" width="40" height="4" rx="2" fill="white" opacity="0.9"/>

  <!-- Day grid - row 1 -->
  <rect x="22" y="56" width="10" height="10" rx="3" fill="#e0e7ff"/>
  <rect x="38" y="56" width="10" height="10" rx="3" fill="#e0e7ff"/>
  <rect x="54" y="56" width="10" height="10" rx="3" fill="#6366f1"/>
  <rect x="70" y="56" width="10" height="10" rx="3" fill="#e0e7ff"/>
  <rect x="86" y="56" width="10" height="10" rx="3" fill="#e0e7ff"/>
  <rect x="102" y="56" width="10" height="10" rx="3" fill="#e0e7ff"/>

  <!-- Day grid - row 2 -->
  <rect x="22" y="72" width="10" height="10" rx="3" fill="#e0e7ff"/>
  <rect x="38" y="72" width="10" height="10" rx="3" fill="#e0e7ff"/>
  <rect x="54" y="72" width="10" height="10" rx="3" fill="#e0e7ff"/>
  <rect x="70" y="72" width="10" height="10" rx="3" fill="#4f46e5"/>
  <rect x="86" y="72" width="10" height="10" rx="3" fill="#e0e7ff"/>
  <rect x="102" y="72" width="10" height="10" rx="3" fill="#e0e7ff"/>

  <!-- Event card strip row 3 -->
  <rect x="22" y="88" width="46" height="10" rx="3" fill="#6366f1" opacity="0.85"/>
  <rect x="74" y="88" width="38" height="10" rx="3" fill="#e0e7ff"/>

  <!-- Event label on strip -->
  <rect x="26" y="91" width="24" height="3" rx="1.5" fill="white" opacity="0.9"/>

  <!-- Small star/sparkle accent top-right of header -->
  <circle cx="104" cy="31" r="4" fill="white" opacity="0.3"/>
  <circle cx="104" cy="31" r="2" fill="white" opacity="0.6"/>
</svg>
