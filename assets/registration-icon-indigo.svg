<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img">
  <title>Registration Icon</title>
  <rect width="128" height="128" rx="24" fill="#6366f1"/>
  <!-- Form card -->
  <rect x="14" y="18" width="100" height="92" rx="10" fill="white" opacity="0.95"/>
  <!-- Form header -->
  <rect x="14" y="18" width="100" height="22" rx="10" fill="#4f46e5"/>
  <rect x="14" y="30" width="100" height="10" fill="#4f46e5"/>
  <rect x="22" y="25" width="40" height="5" rx="2.5" fill="white" opacity="0.8"/>
  <!-- Field 1 label + input -->
  <rect x="22" y="50" width="30" height="4" rx="2" fill="#c7d2fe"/>
  <rect x="22" y="57" width="84" height="10" rx="4" fill="#e0e7ff"/>
  <!-- Field 2 label + input -->
  <rect x="22" y="72" width="24" height="4" rx="2" fill="#c7d2fe"/>
  <rect x="22" y="79" width="84" height="10" rx="4" fill="#e0e7ff"/>
  <!-- Field 3 split -->
  <rect x="22" y="94" width="16" height="4" rx="2" fill="#c7d2fe"/>
  <rect x="22" y="101" width="36" height="9" rx="4" fill="#e0e7ff"/>
  <!-- Submit button -->
  <rect x="66" y="101" width="40" height="9" rx="4" fill="#6366f1"/>
  <rect x="74" y="104" width="24" height="3" rx="1.5" fill="white" opacity="0.9"/>
</svg>
