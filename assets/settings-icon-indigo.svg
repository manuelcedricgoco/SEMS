<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img">
  <title>Settings Icon</title>
  <rect width="128" height="128" rx="24" fill="#6366f1"/>
  <!-- Gear outer ring -->
  <circle cx="64" cy="64" r="30" fill="none" stroke="white" stroke-width="10" opacity="0.95"/>
  <!-- Gear teeth -->
  <rect x="57" y="14" width="14" height="16" rx="4" fill="white" opacity="0.95"/>
  <rect x="57" y="98" width="14" height="16" rx="4" fill="white" opacity="0.95"/>
  <rect x="14" y="57" width="16" height="14" rx="4" fill="white" opacity="0.95"/>
  <rect x="98" y="57" width="16" height="14" rx="4" fill="white" opacity="0.95"/>
  <!-- Diagonal teeth -->
  <rect x="22" y="22" width="14" height="14" rx="4" fill="white" opacity="0.95" transform="rotate(45 29 29)"/>
  <rect x="92" y="22" width="14" height="14" rx="4" fill="white" opacity="0.95" transform="rotate(45 99 29)"/>
  <rect x="22" y="92" width="14" height="14" rx="4" fill="white" opacity="0.95" transform="rotate(45 29 99)"/>
  <rect x="92" y="92" width="14" height="14" rx="4" fill="white" opacity="0.95" transform="rotate(45 99 99)"/>
  <!-- Inner circle -->
  <circle cx="64" cy="64" r="16" fill="#4f46e5"/>
  <circle cx="64" cy="64" r="8" fill="white" opacity="0.9"/>
</svg>
