<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img">
  <title>Dashboard Icon</title>
  <desc>Indigo dashboard icon with stat cards and bar chart</desc>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#6366f1"/>

  <!-- Top-left stat card -->
  <rect x="14" y="14" width="44" height="32" rx="6" fill="white" opacity="0.95"/>

  <!-- Top-right stat card -->
  <rect x="70" y="14" width="44" height="32" rx="6" fill="white" opacity="0.95"/>

  <!-- Stat lines - left card -->
  <rect x="20" y="22" width="18" height="3" rx="2" fill="#6366f1"/>
  <rect x="20" y="29" width="12" height="3" rx="2" fill="#a5b4fc"/>

  <!-- Stat lines - right card -->
  <rect x="76" y="22" width="18" height="3" rx="2" fill="#6366f1"/>
  <rect x="76" y="29" width="28" height="3" rx="2" fill="#a5b4fc"/>

  <!-- Bar chart panel -->
  <rect x="14" y="56" width="100" height="40" rx="6" fill="white" opacity="0.95"/>

  <!-- Bars -->
  <rect x="24" y="74" width="8" height="14" rx="2" fill="#6366f1"/>
  <rect x="38" y="68" width="8" height="20" rx="2" fill="#6366f1"/>
  <rect x="52" y="64" width="8" height="24" rx="2" fill="#6366f1"/>
  <rect x="66" y="71" width="8" height="17" rx="2" fill="#6366f1"/>
  <rect x="80" y="66" width="8" height="22" rx="2" fill="#818cf8"/>
  <rect x="94" y="60" width="8" height="28" rx="2" fill="#818cf8"/>

  <!-- Bottom mini panels -->
  <rect x="14" y="106" width="30" height="14" rx="4" fill="white" opacity="0.95"/>
  <rect x="52" y="106" width="30" height="14" rx="4" fill="white" opacity="0.65"/>
  <rect x="90" y="106" width="24" height="14" rx="4" fill="white" opacity="0.4"/>
</svg>
